<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Love ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: #fff;
      text-align: center;
      overflow: hidden;
    }
    .container {
      padding: 40px 20px;
    }
    h1 {
      font-size: 2.5em;
    }
    h2 {
      margin-top: 10px;
    }
    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      margin-top: 10px;
    }
    .question {
      font-size: 1.5em;
      margin: 30px 0;
    }
    button {
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      margin: 10px;
      cursor: pointer;
      position: relative;
    }
    #yesBtn {
      background: #fff;
      color: #ff4d6d;
    }
    #noBtn {
      background: #222;
      color: #fff;
      position: absolute;
    }
    .final {
      font-size: 2em;
      margin-top: 20px;
    }
    .heart {
      position: fixed;
      color: red;
      animation: float 5s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-800px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hey My Love ❤️</h1>
    <h2>My Dear [ସୁନ୍ଦରୀ] 💖</h2><img src="her-photo.jpg" alt="love">

<div id="question" class="question"></div>

<button id="yesBtn" onclick="nextQuestion()">Yes 💖</button>
<button id="noBtn">No 😜</button>

<div id="final" class="final"></div>

<!-- Music -->
<audio id='music' loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

  </div>  <script>
    const questions = [
      "Do you love me? ❤️",
      "Am I your favorite person? 💍",
      "Do you love anyone else besides me? 🥺",
      "was joking with you, I know you love me. 🌹",
      "Will you marry me? 💍🥺"
    ];

    let index = 0;

    const questionEl = document.getElementById("question");
    const noBtn = document.getElementById("noBtn");
    const finalEl = document.getElementById("final");

    function showQuestion() {
      questionEl.innerText = questions[index];
    }

    function nextQuestion() {
      index++;
      if (index < questions.length) {
        showQuestion();
      } else {
        questionEl.style.display = "none";
        document.getElementById("yesBtn").style.display = "none";
        noBtn.style.display = "none";
        finalEl.innerText = "Yayyy! You are mine forever ❤️🥺💍";
        startHearts();
      }
    }

    // Move NO button
    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    // Floating hearts
    function startHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }, 300);
    }

    showQuestion();
  </script></body>
</html>
